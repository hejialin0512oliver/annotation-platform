<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>User Behavior Annotation Platform</title>
    <script>
      // GitHub Pages SPA 404 重定向
      // 将子路径存储在 sessionStorage 中，然后跳转到首页
      var path = window.location.pathname.replace(/^\/annotation-platform/, '') || '/'
      sessionStorage.setItem('redirect-path', path)
      window.location.replace('/annotation-platform/')
    </script>
  </head>
  <body></body>
</html>
